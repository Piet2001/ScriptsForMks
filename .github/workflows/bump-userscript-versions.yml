name: Bump userscript versions

on:
  push:
    paths:
      - '*.user.js'
      - '**/*.user.js'

permissions:
  contents: write

jobs:
  bump-versions:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Amsterdam
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump versions in changed userscripts
        run: node .github/scripts/bump-userscript-versions.mjs

      - name: Commit bumped versions
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump userscript versions [skip ci]"
          git push